name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  testbot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SKYRAMP_TESTBOT_APP_ID }}
          private-key: ${{ secrets.SKYRAMP_TESTBOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: skyramp/testbot@v0.6.2
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropicApiKey: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          githubToken: ${{ steps.app-token.outputs.token }}
          skyrampMcpVersion: next

          targetSetupCommand: './deployment-testbot/setup.sh'
          targetReadyCheckCommand: 'curl -f http://localhost:4200/api/health'
          targetReadyCheckTimeout: 90
          authTokenCommand: './deployment-testbot/get-token.sh'

